server {
    listen 80;
    server_name aibot.matrixupp.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name aibot.matrixupp.com;

    ssl_certificate     /etc/letsencrypt/live/aibot.matrixupp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aibot.matrixupp.com/privkey.pem;

    # Proxy all requests to the FastAPI app
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Streaming support (for future SSE)
        proxy_buffering    off;
        proxy_read_timeout 120s;
    }
}
